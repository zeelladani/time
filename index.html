<script>
    // REGISTER SERVICE WORKER FOR OFFLINE SUPPORT & INSTALLATION
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').then(reg => {
            console.log('Service Worker registered!', reg);
        }).catch(err => {
            console.log('Service Worker registration failed:', err);
        });
    }

    // Check online/offline status
    window.addEventListener('online', () => {
        document.getElementById('offlineIndicator').classList.remove('show');
    });
    window.addEventListener('offline', () => {
        document.getElementById('offlineIndicator').classList.add('show');
    });

    // IST TIMEZONE
    function getCurrentISTDate() {
        const nowUTC = new Date();
        return new Date(nowUTC.getTime() + 5.5 * 60 * 60 * 1000);
    }
    function getISTComponents() {
        const d = getCurrentISTDate();
        return { year: d.getUTCFullYear(), month: d.getUTCMonth(), day: d.getUTCDate(), hours: d.getUTCHours(), minutes: d.getUTCMinutes(), seconds: d.getUTCSeconds(), fullDate: d };
    }
    function updateLiveClock() {
        const { year, month, day, hours, minutes, seconds } = getISTComponents();
        document.getElementById('liveDateDisplay').innerText = `${String(day).padStart(2,'0')}:${String(month+1).padStart(2,'0')}:${year}`;
        document.getElementById('liveTimeDisplay').innerText = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
    }
    function getDayOfYear() {
        const { year, fullDate } = getISTComponents();
        const start = new Date(Date.UTC(year, 0, 1));
        const nowUTC = new Date(fullDate.getTime() - 5.5*3600000);
        return Math.floor((nowUTC - start) / 86400000) + 1;
    }
    function totalDaysYear(y) { return ((y%4===0&&y%100!==0)||y%400===0)?366:365; }
    
    const { year: currentYear, month: currentMonthIdx, day: currentDay } = getISTComponents();
    const totalDays = totalDaysYear(currentYear);
    let dayOfYear = getDayOfYear();
    function refreshProgress() {
        const comps = getISTComponents();
        const start = new Date(Date.UTC(comps.year, 0, 1));
        const nowUTC = new Date(comps.fullDate.getTime() - 5.5*3600000);
        const newDay = Math.floor((nowUTC - start) / 86400000) + 1;
        const percent = Math.min(100, Math.max(0, ((nowUTC - start) / (totalDaysYear(comps.year)*86400000)) * 100));
        return { dayOfYear: newDay, percent };
    }
    
    const isLeap = totalDays === 366;
    const quarters = [
        { name: "Q1 · Jan–Mar", days: isLeap?91:90, startDay: 1, color: "#3b82f6" },
        { name: "Q2 · Apr–Jun", days: 91, startDay: isLeap?92:91, color: "#06b6d4" },
        { name: "Q3 · Jul–Sep", days: 92, startDay: isLeap?183:182, color: "#f59e0b" },
        { name: "Q4 · Oct–Dec", days: 92, startDay: isLeap?275:274, color: "#ec4899" }
    ];
    if(!isLeap) quarters[0].days=90;
    
    function getCurrentQuarter() {
        for(let q of quarters) {
            if(dayOfYear >= q.startDay && dayOfYear <= q.startDay+q.days-1) return q;
        }
        return quarters[0];
    }
    function getQuarterProgress(dayNum, q) {
        if(dayNum < q.startDay) return 0;
        if(dayNum > q.startDay+q.days-1) return 100;
        return ((dayNum - q.startDay + 1) / q.days) * 100;
    }
    
    const monthNamesShort = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const monthStartDays = [1,32,60,91,121,152,182,213,244,274,305,335];
    if(isLeap) { monthStartDays[2]=61; monthStartDays[3]=92; monthStartDays[4]=122; monthStartDays[5]=153; monthStartDays[6]=183; monthStartDays[7]=214; monthStartDays[8]=245; monthStartDays[9]=275; monthStartDays[10]=306; monthStartDays[11]=336; }
    
    function getMonthProgress(dayNum, monthIdx) {
        let start = monthStartDays[monthIdx];
        let end = (monthIdx===11 ? totalDays : monthStartDays[monthIdx+1]-1);
        if(dayNum < start) return 0;
        if(dayNum > end) return 100;
        return ((dayNum - start + 1) / (end - start + 1)) * 100;
    }
    
    function getMoonPhase() {
        const now = getCurrentISTDate();
        const lunar = 29.530587;
        const newMoon2000 = new Date(Date.UTC(2000,0,6,18,14));
        const diff = (now - newMoon2000) / (1000*3600*24);
        const phase = (diff % lunar) / lunar;
        if(phase<0.03) return { name:"🌑 New Moon", icon:"🌑" };
        if(phase<0.23) return { name:"🌒 Waxing Crescent", icon:"🌒" };
        if(phase<0.27) return { name:"🌓 First Quarter", icon:"🌓" };
        if(phase<0.48) return { name:"🌔 Waxing Gibbous", icon:"🌔" };
        if(phase<0.52) return { name:"🌕 Full Moon", icon:"🌕" };
        if(phase<0.73) return { name:"🌖 Waning Gibbous", icon:"🌖" };
        if(phase<0.77) return { name:"🌗 Last Quarter", icon:"🌗" };
        return { name:"🌘 Waning Crescent", icon:"🌘" };
    }
    function getAstroEvent() {
        const { month, day } = getISTComponents();
        if(month===0 && day<5) return "Quadrantids";
        if(month===3 && day>=21 && day<=23) return "Lyrids";
        if(month===7 && day>=11 && day<=13) return "Perseids";
        if(month===10 && day>=16 && day<=18) return "Leonids";
        if(month===11 && day>=13 && day<=15) return "Geminids";
        return "Stargazing";
    }
    
    const seasonMap = ['winter','winter','spring','spring','spring','summer','summer','summer','autumn','autumn','autumn','winter'];
    let currentSeason = seasonMap[currentMonthIdx];
    function updateSeasonUI() {
        const iconMap = { spring:"🌸", summer:"☀️", autumn:"🍂", winter:"❄️" };
        document.getElementById('seasonIcon').innerHTML = iconMap[currentSeason];
        document.getElementById('seasonLabel').innerHTML = currentSeason.charAt(0).toUpperCase() + currentSeason.slice(1);
        addParticles(iconMap[currentSeason]);
    }
    function addParticles(emoji) {
        let bg = document.querySelector('.seasonal-bg');
        if(!bg) { bg = document.createElement('div'); bg.className = 'seasonal-bg'; document.body.prepend(bg); }
        bg.innerHTML = '';
        for(let i=0;i<18;i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.innerHTML = emoji;
            p.style.left = Math.random()*100+'%';
            p.style.animationDuration = 4+Math.random()*6+'s';
            p.style.fontSize = 10+Math.random()*14+'px';
            bg.appendChild(p);
        }
    }
    
    function renderUI() {
        const { dayOfYear, percent } = refreshProgress();
        const currentQ = getCurrentQuarter();
        const allQuartersHtml = quarters.map(q => {
            const qProg = getQuarterProgress(dayOfYear, q);
            const isCurrent = (q.name === currentQ.name);
            return `<div class="quarter-card ${isCurrent ? 'current-quarter-highlight' : ''}">
                        <div class="quarter-title"><span>${q.name}</span><span>${Math.floor(qProg)}%</span></div>
                        <div class="quarter-progress-bar"><div style="width:${qProg}%; height:100%; background:${q.color}; border-radius:20px;"></div></div>
                        <div style="font-size:0.65rem;">${Math.floor((qProg/100)*q.days)}/${q.days} days</div>
                    </div>`;
        }).join('');
        document.getElementById('quartersContainer').innerHTML = allQuartersHtml;
        
        const monthProgress = getMonthProgress(dayOfYear, currentMonthIdx);
        const monthFullName = ["January","February","March","April","May","June","July","August","September","October","November","December"][currentMonthIdx];
        const monthDays = new Date(currentYear, currentMonthIdx+1, 0).getDate();
        const weeksInMonth = Math.ceil(monthDays/7);
        const currentWeek = Math.ceil(currentDay/7);
        document.getElementById('currentMonthCard').innerHTML = `
            <div class="month-header"><span class="month-name">${monthFullName} ${currentYear}</span><span style="font-size:0.7rem;">${Math.floor(monthProgress)}%</span></div>
            <div class="month-progress-bar"><div style="width:${monthProgress}%; height:100%; background: #10b981; border-radius:20px;"></div></div>
            <div style="display:flex; justify-content:space-between; font-size:0.7rem;"><span>Day ${currentDay}/${monthDays}</span><span>Week ${currentWeek}/${weeksInMonth}</span></div>
            <div class="week-breakdown">${Array.from({length: weeksInMonth}, (_,i) => `<span class="week-chip">${i+1===currentWeek ? '🎯' : (i+1<currentWeek ? '✅' : '⏳')} Week ${i+1}</span>`).join('')}</div>
        `;
        
        if(document.getElementById('heatmapGrid')) {
            const monthPcts = [];
            for(let m=0;m<12;m++) monthPcts.push(getMonthProgress(dayOfYear, m));
            const heatHtml = monthPcts.map((p,i) => `<div class="heatmap-cell ${i===currentMonthIdx ? 'current-month-highlight' : ''}" style="background: ${i===currentMonthIdx ? 'linear-gradient(135deg,#3b82f6,#a855f7)' : `rgba(59,130,246,${0.15 + p/100*0.5})`}"><strong>${monthNamesShort[i]}</strong><br>${i===currentMonthIdx ? Math.floor(p)+'%' : (i<currentMonthIdx ? '✓' : '·')}</div>`).join('');
            document.getElementById('heatmapGrid').innerHTML = heatHtml;
        }
        
        document.getElementById('globalFill').style.width = percent+'%';
        document.getElementById('globalPercent').innerHTML = percent.toFixed(1)+'%';
        document.getElementById('dayCount').innerHTML = `Day ${dayOfYear}/${totalDays}`;
        
        const moon = getMoonPhase();
        document.getElementById('moonIcon').innerHTML = moon.icon;
        document.getElementById('moonPhaseName').innerHTML = moon.name;
        document.getElementById('astroEvent').innerHTML = getAstroEvent();
        const { day, month } = getISTComponents();
        document.getElementById('astroDate').innerHTML = `${monthNamesShort[month]} ${day}`;
        document.getElementById('istTime').innerHTML = `🕘 ${getCurrentISTDate().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'})}`;
    }
    
    function takeSnapshot() {
        const { dayOfYear, percent } = refreshProgress();
        const canvas = document.getElementById('snapshotCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 480;
        
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#f8fafc'; ctx.fillRect(0,0,canvas.width,canvas.height);
        
        ctx.fillStyle = '#0f172a'; ctx.font = 'bold 20px "Segoe UI"';
        ctx.fillText(`📅 YEAR PROGRESS · ${currentYear}`, 25, 45);
        ctx.font = '14px system-ui'; ctx.fillStyle = '#1e293b';
        ctx.fillText(`Overall: ${percent.toFixed(1)}% complete (Day ${dayOfYear} of ${totalDays})`, 25, 80);
        ctx.fillStyle = '#e2e8f0'; ctx.fillRect(25, 100, canvas.width - 50, 14);
        ctx.fillStyle = '#3b82f6'; ctx.fillRect(25, 100, (canvas.width - 50) * (percent / 100), 14);
        
        const currQ = getCurrentQuarter();
        const qProg = getQuarterProgress(dayOfYear, currQ);
        ctx.fillStyle = '#0f172a'; ctx.font = 'bold 14px monospace';
        ctx.fillText(`🔹 CURRENT QUARTER`, 25, 145);
        ctx.font = '12px system-ui'; ctx.fillStyle = '#334155';
        ctx.fillText(`${currQ.name} · ${Math.floor(qProg)}% completed (${Math.floor((qProg/100)*currQ.days)}/${currQ.days} days)`, 35, 175);
        ctx.fillStyle = '#e2e8f0'; ctx.fillRect(35, 190, 300, 10);
        ctx.fillStyle = currQ.color; ctx.fillRect(35, 190, 300 * (qProg / 100), 10);
        
        const monthProgress = getMonthProgress(dayOfYear, currentMonthIdx);
        const monthNameShort = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][currentMonthIdx];
        ctx.fillStyle = '#0f172a'; ctx.font = 'bold 14px monospace';
        ctx.fillText(`📆 CURRENT MONTH`, 25, 235);
        ctx.font = '12px system-ui'; ctx.fillStyle = '#334155';
        ctx.fillText(`${monthNameShort} ${currentYear} · ${Math.floor(monthProgress)}% through month`, 35, 265);
        ctx.fillStyle = '#e2e8f0'; ctx.fillRect(35, 280, 300, 10);
        ctx.fillStyle = '#10b981'; ctx.fillRect(35, 280, 300 * (monthProgress / 100), 10);
        
        const moon = getMoonPhase();
        ctx.fillStyle = '#0f172a'; ctx.font = 'bold 14px monospace';
        ctx.fillText(`🌙 ASTRONOMY`, 380, 145);
        ctx.font = '12px system-ui'; ctx.fillStyle = '#334155';
        ctx.fillText(`${moon.icon} ${moon.name}`, 390, 175);
        ctx.fillStyle = '#475569'; ctx.fillText(`${getAstroEvent()}`, 390, 200);
        
        ctx.fillStyle = '#3b82f6'; ctx.font = '10px monospace';
        ctx.fillText(`📷 @zeel_ladani129  |  zeelladani.in`, 25, canvas.height - 40);
        const nowStr = getCurrentISTDate().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', dateStyle: 'full', timeStyle: 'short' });
        ctx.fillStyle = '#6c757d'; ctx.font = '8px monospace';
        ctx.fillText(nowStr, 25, canvas.height - 18);
        
        document.getElementById('snapshotModal').classList.add('active');
    }
    
    document.getElementById('snapshotBtn').addEventListener('click', takeSnapshot);
    document.getElementById('closeModal').addEventListener('click', () => document.getElementById('snapshotModal').classList.remove('active'));
    document.getElementById('downloadSnap').addEventListener('click', () => {
        const canvas = document.getElementById('snapshotCanvas');
        const link = document.createElement('a');
        link.download = `year-progress-${currentYear}.png`;
        link.href = canvas.toDataURL();
        link.click();
    });
    
    // PWA Installation
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const installBtn = document.createElement('button');
        installBtn.innerText = '📲 Install App';
        installBtn.className = 'install-pwa-btn';
        installBtn.onclick = () => {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                if (choiceResult.outcome === 'accepted') {
                    console.log('User accepted install');
                }
                installBtn.remove();
                deferredPrompt = null;
            });
        };
        document.querySelector('.header-row').appendChild(installBtn);
    });
    
    setInterval(() => { updateLiveClock(); renderUI(); }, 1000);
    updateLiveClock();
    renderUI();
    updateSeasonUI();
</script>

    const serviceWorkerCode = `const CACHE_NAME = 'year-compass-v1';
const urlsToCache = [

];

self.addEventListener('install', event => {
    event.waitUntil(
        caches.open(CACHE_NAME)
            .then(cache => cache.addAll(urlsToCache))
    );
});

self.addEventListener('fetch', event => {
    event.respondWith(
        caches.match(event.request)
            .then(response => response || fetch(event.request))
    );
});`;

    // Write service worker if not exists (for demo purposes, we create it dynamically)
    if (typeof window !== 'undefined') {
        const blob = new Blob([serviceWorkerCode], {type: 'application/javascript'});
        const url = URL.createObjectURL(blob);

    }
